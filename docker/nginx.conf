server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip dos assets do bundle web
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA: qualquer rota cai no index.html (react-navigation cuida do resto).
    # Sem cache: sem isso o navegador reaproveita o index.html antigo entre
    # deploys (sem revalidar), então a versão nova nunca aparece sem hard-refresh.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Assets com hash no nome (_expo/static/...) mudam de nome a cada build —
    # podem ser cacheados por muito tempo sem risco de servir versão velha.
    location /_expo/static/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Sincronizar dispositivos (web ↔ celular): formulário do QR e API de
    # pareamento vivem no serviço "proxy" — o celular alcança tudo pela
    # mesma porta 8080 do painel.
    location /pair {
        proxy_pass http://proxy:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
    }
    location /api/ {
        proxy_pass http://proxy:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
    }

    # Proxy de streams same-origin: o webapp chama /proxy?url=<stream> e o
    # serviço "proxy" (proxy-server.js) reescreve para o host de origem,
    # contornando CORS. Sem isso, IPTV/Jellyfin barram no navegador.
    location /proxy {
        proxy_pass http://proxy:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }
}
